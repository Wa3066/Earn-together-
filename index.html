<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earn Together</title>

  <link rel="stylesheet" href="css/style.css">

<style>

/* ====== GLOBAL ====== */
body {
  margin: 0;
  font-family: Arial;
  background: url("images/bg.jpg") no-repeat center center fixed;
  background-size: cover;
}

/* ====== LAYOUT ====== */
.wrapper {
  display: flex;
}

/* ====== SIDEBAR ====== */
.sidebar {
  width: 150px;
  height: 100vh;
  background: rgba(0,0,0,0.8);
  color: white;
  position: fixed;
}

.sidebar h2 {
  text-align: center;
  padding: 20px;
}

.sidebar a {
  display: block;
  padding: 15px;
  color: white;
  text-decoration: none;
}

.sidebar a:hover {
  background: #007bff;
}

/* ====== MAIN ====== */
.main {
  margin-left: 220px;
  width: 100%;
}

/* ====== HEADER ====== */
.header {
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 15px;

  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ====== CONTENT ====== */
.content {
  padding: 20px;
}

/* ====== CARDS GRID ====== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
  gap: 20px;
}

/* ====== CARD ====== */
.card {
  background: rgba(0,0,0,0.6);
  padding: 50px;
  border-radius: 10px;
  color: white;
}

/* ====== BUTTON ====== */
button {
  width: 30%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  background: #007bff;
  gap: 20px;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

/* ====== INPUT ====== */
input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 6px;
  border: none;
}

/* ====== TABLE ====== */
table {
  width: 100%;
  margin-top: 10px;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

</style>
</head>
</style>

</head>

<body>

<div class="container">

<div class="card">
<h2>Login</h2>
<input id="login-username" placeholder="Username">
<input id="login-password" type="password" placeholder="Password">

<br><button id="login-btn">Login</button>
<br><br><br><br><br><br><h4>New User click Here to register</h4>
<button id="signup-btn">Sign-up</button>
</div>

<hr>

</div>

<script src="js/auth.js"></script>

</body>
</html>
